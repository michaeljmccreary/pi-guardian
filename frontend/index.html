<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Network Devices Dashboard</h1>
    <button onclick="scanDevices()">Scan Devices</button>
    <div id="devices"></div>
<script>
function scanDevices() {
  fetch('/api/scan')
    .then(response => response.json())
    .then(data => {
      const devicesDiv = document.getElementById('devices');
      devicesDiv.innerHTML = '';

      data.forEach(device => {
        const row = document.createElement('div');

        row.innerHTML = `
          ${device.IP} - ${device.mac_address || ''} - ${device.hostname || ''}
          <button onclick="scanDevice('${device.IP}', this)">Scan</button>
          <span></span>
        `;

        devicesDiv.appendChild(row);
      });
    });
}

function scanDevice(ip, btn) {
  const statusSpan = btn.nextElementSibling;
  statusSpan.textContent = ' scanning…';

  fetch('/api/scan_device', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ip })
  })
  .then(r => r.json())
  .then(data => {
    pollStatus(data.job_id, statusSpan);
  });
}

function pollStatus(jobId, span) {
  fetch(`/api/scan_status/${jobId}`)
    .then(r => r.json())
    .then(data => {
      span.textContent = ' ' + data.status;
      if (data.status === 'queued' || data.status === 'running') {
        setTimeout(() => pollStatus(jobId, span), 2000);
      }
      if (data.status === 'done') {
        const ports = data.open_ports || [];
        span.textContent = ' done. Open ports: ' + (ports.length ? ports.join(', ') : 'none');
      }
    });
}

// load devices on page load
scanDevices();
</script>
</body>
</html>
