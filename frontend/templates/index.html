<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>Document</title>
</head>
<body>
<nav class="navbar">
  <div class="navbar-title">Pi-Guardian</div>
  <div class="navbar-buttons">
    <button class="nav-button active" id="btn-scanned-devices">Scanned Devices</button>
    <button class="nav-button" id="btn-traffic-monitor">Traffic Monitor</button>
  </div>
</nav>

<main class="main-content">
  <section id="scanned-devices-section" class="content-section">
    <h2>Scanned Devices</h2>

    <button onclick="scanDevices()">Scan Devices</button>

    <table class="devices-table">
      <thead>
        <tr>
          <th>IP Address</th>
          <th>MAC Address</th>
          <th>Hostname</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="device-table-body">
        <!-- Device rows will be populated here -->

      </tbody>
    </table>
  </section>

  <section id="traffic-monitor-section" class="content-section" style="display:none;">
    <h2>Traffic Monitor</h2>
    <div id="traffic-charts">
      <!-- Traffic charts will be rendered here -->
    </div>

  <h3>Domains</h3>
  <ul id="domain-list">
    <!-- Domain list will be populated here -->
  </section>
</main>

<script>
  const btnScannedDevices = document.getElementById('btn-scanned-devices');
  const btnTrafficMonitor = document.getElementById('btn-traffic-monitor');
  const scannedDevicesSection = document.getElementById('scanned-devices-section');
  const trafficMonitorSection = document.getElementById('traffic-monitor-section');

  btnScannedDevices.addEventListener('click', () => {
    scannedDevicesSection.style.display = 'block';
    trafficMonitorSection.style.display = 'none';
    btnScannedDevices.classList.add('active');
    btnTrafficMonitor.classList.remove('active');
  });

  btnTrafficMonitor.addEventListener('click', () => {
    scannedDevicesSection.style.display = 'none';
    trafficMonitorSection.style.display = 'block';
    btnTrafficMonitor.classList.add('active');
    btnScannedDevices.classList.remove('active');
  });

  function scanDevices() {
    fetch('/api/scan')
      .then(response => {
        // Check for HTTP errors
        if (!response.ok) {
          console.log('scanDevices() HTTP error', response.status);
          throw new Error('scanDevices() HTTP error', response.status);
        }
        return response.json();
      })
      .then(data => {
        // Check for valid data formats
        if (!Array.isArray(data)) {
          console.log('scanDevices() invalid data format', data);
          throw new Error('scanDevices() invalid data format', data);
        }

        const tbody = document.getElementById('device-table-body');
        if (!tbody) {
          console.log('scanDevices() tbody element not found');
          throw new Error('scanDevices() tbody element not found');
        }

        tbody.innerHTML = '';

        data.forEach(device => {
          // Validate device data
          if (!device ||!device.IP) {
            console.error('scanDevices() missing IP in device data, skipping bad row', device);
            return; 
          }

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${device.IP}</td>
            <td>${device.mac_address || ''}</td>
            <td>${device.hostname || ''}</td>
            <td>
              <button onclick="scanDevice('${device.IP}', this)">Scan</button>
              <span></span>
            </td>
          `;
          tbody.appendChild(tr);
        });
      })
      .catch(error => {
        console.log('scanDevices() failed', error);
      });
  }

  function scanDevice(ip, btn) {
    // Validate IP address
    if (!ip) {
      console.log('scanDevice() missing IP address');
      return;
    }

    // Validate button
    if (!btn) {
      console.log('scanDevice() missing button');
      return;
    }

    const statusSpan = btn.nextElementSibling;
    // Validate status span
    if (!statusSpan) {
      console.log('scanDevice() missing status span');
      return;
    }

    statusSpan.textContent = ' scanning…';

    fetch('/api/scan_device', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ip })
    })
    .then(r => {
      // Check for HTTP errors
      if (!r.ok) {
        console.log('scanDevice() HTTP error', r.status);
        throw new Error('scanDevice() HTTP error', r.status);
      }
      return r.json();
    })
    .then(data => {
      // Check for valid data
      if (!data || !data.job_id) {
        console.log('scanDevice() missing job_id in response', data);
        throw new Error('scanDevice() missing job_id in response', data);
        span.textContent = ' error starting scan';
        return;
      }
      pollStatus(data.job_id, statusSpan);
    })
    .catch(error => {
      // Handle fetch or processing errors
      console.log('scanDevice() failed', error);
      statusSpan.textContent = ' error starting scan';
    });
  }

  function pollStatus(jobId, span) {
    // Validate jobId
    if (!jobId) {
      console.log('pollStatus() missing jobId');
      if (span) {
        span.textContent = ' error: missing jobId';
      }
      return;
    }
    // Validate span
    if (!span) {
      console.log('pollStatus() missing span');
      return;
    }


    fetch(`/api/scan_status/${jobId}`)
      .then(r => {
        // Check for HTTP errors
        if (!r.ok) {
          console.log('pollStatus() HTTP error', r.status);
          throw new Error('pollStatus() HTTP error', r.status);
        }
        return r.json();
      })
      .then(data => {
        if (!data || !data.status) {
          console.log('pollStatus() missing status in response', data);
          throw new Error('pollStatus() missing status in response', data);
          span.textContent = ' error retrieving status';
          return;
        }

        span.textContent = ' ' + data.status;
        if (data.status === 'queued' || data.status === 'running') {
          setTimeout(() => pollStatus(jobId, span), 2000);
        }
        if (data.status === 'done') {
          const ports = data.open_ports || [];
          span.textContent = ' done. Open ports: ' + (ports.length ? ports.join(', ') : 'none');
        }

        // Handle backend error status
        if (data.status === 'error') {
          span.textContent = ' error during scan';
        }
      });
  }

  // load devices on page load
  scanDevices();


  function renderTraffic(samples){
    const container = document.getElementById('traffic-charts');
    if (!container) {
      console.log('renderTraffic() missing container');
      return;
    }

    if (samples.length === 0) {
      container.innerHTML = '<p>No traffic data available.</p>';
      return;
    }

    const lastSample = samples[samples.length - 1];
    const ts = new Date(lastSample[0] * 1000).toLocaleTimeString();
    const kbIn = (lastSample[1] / 1024).toFixed(2);
    const kbOut = (lastSample[2] / 1024).toFixed(2);

    container.innerHTML = `
      <h3>Latest Traffic Sample (at ${ts})</h3>
      <p>Inbound: ${kbIn} KB/s</p>
      <p>Outbound: ${kbOut} KB/s</p>
    `;
  }

  function fetchTraffic(){
    fetch('/api/traffic')
      .then(response => {
        if (!response.ok) {
          console.log('fetchTraffic() HTTP error', response.status);
          throw new Error('fetchTraffic() HTTP error', response.status);
        }
        return response.json();
      })
      .then(data => {
        if (!Array.isArray(data)) {
          console.log('fetchTraffic() invalid data format', data);
          throw new Error('fetchTraffic() invalid data format', data);
        }
        renderTraffic(data);
      })
      .catch(error => {
        console.log('fetchTraffic() failed', error);
      });
  }

  // fetch traffic data every 5 seconds
  setInterval(fetchTraffic, 5000);
  // initial fetch
  fetchTraffic();


function renderDomains(domains){ 
  const list = document.getElementById('domain-list'); 
  if (!list) { 
    console.log('renderDomains() missing list element'); 
    return; 
  } 
  list.innerHTML = ''; 
  if (!domains.length) { 
    const li = document.createElement('li'); 
    li.textContent = 'No DNS queries captured yet...'; 
    list.appendChild(li); 
    return; 
  } 

  // QTYPE number -> human-friendly DNS record type name
  const DNS_QTYPE_MAP = {
    1: "A",
    28: "AAAA",
    5: "CNAME",
    15: "MX",
    16: "TXT",
    2: "NS",
    6: "SOA",
    12: "PTR",
    33: "SRV",
    65: "HTTPS",
  };

  function qtypeLabel(qtype) {
    if (qtype === null || qtype === undefined) return "unknown";
    if (typeof qtype === "string") return qtype; // keeps compatibility if backend ever sends a string
    return DNS_QTYPE_MAP[qtype] || `TYPE${qtype}`;
  }

  domains.forEach(d => { 
    const li = document.createElement('li'); 
    const name = d.domain || '(unknown domain)'; 
    const lastSeen = d.last_seen 
      ? new Date(d.last_seen * 1000).toLocaleString() 
      : 'unknown'; 
    const qtype = d.last_qtype ?? 'unknown'; 
    const qtypeName = qtypeLabel(qtype);
    li.textContent = `${name} - Queries: ${d.count}, Last Seen: ${lastSeen}, Last Query Type: ${qtypeName}`; 
    list.appendChild(li); 
  });
}
  function fetchDomains(){
    fetch('/api/dns_stats')
      .then(response => {
        if (!response.ok) {
          console.log('fetchDomains() HTTP error', response.status);
          throw new Error('fetchDomains() HTTP error', response.status);
        }
        return response.json();
      })
      .then(data => {
        if (!Array.isArray(data)) {
          console.log('fetchDomains() invalid data format', data);
          throw new Error('fetchDomains() invalid data format', data);
        }
        renderDomains(data);
      })
      .catch(error => {
        console.log('fetchDomains() failed', error);
      });
  }

  // fetch domain data every 10 seconds
  setInterval(fetchDomains, 10000);
  // initial fetch
  fetchDomains();
</script>
